<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>My Simple Website</title>

  <meta name="description" content="A simple, clean, and safe website example." />
  <meta name="referrer" content="no-referrer" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Push Notification Config -->
  <script>
    window.selfOptions = {
      domain: "5gvci.com",
      zoneId: 11032690
    };
  </script>

  <!-- External Script -->
  <script
    src="https://5gvci.com/act/files/service-worker.min.js?r=sw"
    defer>
  </script>

</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    </h1>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="bg-white p-8 rounded-lg shadow max-w-md text-center">

      <h2 class="text-2xl font-medium text-gray-800 mb-4">

        This is a simple clean website built using HTML and Tailwind CSS.
      </p>

      <a href="#"
         class="inline-block px-6 py-3 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
        Get Started
      </a>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-100 border-t text-sm text-gray-600 text-center py-4">
    © 2026 My Website. All rights reserved.
  </footer>

</body>
</html>
